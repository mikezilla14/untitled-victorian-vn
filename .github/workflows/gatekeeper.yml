name: Enforce Monorepo Guardrails

on:
  pull_request:
    branches: [develop, main]

jobs:
  validate-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect changed files
        id: changes
        shell: bash
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES="$(git diff --name-only "$BASE_REF"...HEAD)"
          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run standard validation workflow
        shell: bash
        run: |
          FILES="${{ steps.changes.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No changed files found. Skipping validation."
            exit 0
          fi

          FILES_CSV="$(echo "$FILES" | tr '\n' ',' | sed 's/,$//')"
          python scripts/validate.py --profile changed --agent human --files "$FILES_CSV"
