# .guardrails.yml - Enforced by Gatekeeper Orchestrator
agents:
  - chief_architect
  - lead_narrative_editor
  - forensic_psychology_consultant
  - writers_room
  - spiciness_tuning_agent
  - victorian_consultant
  - prod_code_agent
  - non_prod_code_agent
  - gatekeeper_orchestrator
  - orchestrator
  - adult_market_reviewer
  - scene_direction

domains:
  canon_lore:
    paths:
      - docs/canon/**
      - narrative/canon/**
    mutable_by: [lead_narrative_editor, victorian_consultant, prod_code_agent, human]
    agents_read: [all]
    notes: "Static promoted lore only. Episodic canon is renpy_project/game/day*.rpy."

  character_psychology:
    paths:
      - narrative/canon/characters_canon.md
      - narrative/canon/*_character_canon.md
      - narrative/draft/bible/*_character_non_canon.md
      - narrative/draft/bible/characters_non_canon.md
      - narrative/canon/voice_guides/*_voice_guide.md
      - narrative/pipeline/releases/**/days/**/gates/day*_gate_forensic_psychology.md
      - narrative/pipeline/releases/**/days/**/handoffs/day*_forensic_psychology_profile_report.md
    mutable_by: [forensic_psychology_consultant, lead_narrative_editor, writers_room, human]
    agents_read: [all]
    notes: "Character psychology, player-choice consistency, profile carry-forward, and voice-guide psychology."

  framework_code:
    paths:
      - renpy_project/game/classes.rpy
      - renpy_project/game/screens.rpy
      - renpy_project/game/characters.rpy
      - renpy_project/game/gui.rpy
      - renpy_project/game/options.rpy
      - docs/dev_bible.md
      - docs/game_mechanics_bible.md
    mutable_by: [chief_architect, prod_code_agent, human]
    agents_read: [prod_code_agent, non_prod_code_agent, gatekeeper_orchestrator]

  episodic_code:
    paths:
      - renpy_project/game/day*.rpy
      - renpy_project/game/endings.rpy
      - renpy_project/game/functions.rpy
      - renpy_project/game/script.rpy
    mutable_by: [prod_code_agent, chief_architect, human]
    agents_read: [prod_code_agent, non_prod_code_agent, chief_architect, gatekeeper_orchestrator]
    notes: "Shipped episodic canon — sole runtime source of truth for day content."

  draft_narrative:
    paths:
      - narrative/draft/**
    mutable_by: [writers_room, spiciness_tuning_agent, lead_narrative_editor, forensic_psychology_consultant, non_prod_code_agent, scene_direction, human]
    agents_read: [all]
    notes: "Non-canon promotion drafts, planning, bible, sandbox .rpy. scene_direction writes only `[asset auto]` show/hide lines."

  pipeline_artifacts:
    paths:
      - narrative/pipeline/**
    mutable_by: [writers_room, spiciness_tuning_agent, lead_narrative_editor, forensic_psychology_consultant, victorian_consultant, non_prod_code_agent, human]
    agents_read: [all]
    notes: "Pre-draft exploration. ideas/ and synthesis/ are context-firewalled for new assignments."

  repo_operations:
    paths:
      - README.md
      - .github/**
      - .agents/**
      - .cursor/**
      - .vscode/**
      - .guardrails.yml
      - scripts/**
      - renpy_project/utilities/**
      - docs/*.md
      - docs/backlog/**
      - narrative/README.md
      - narrative/pipeline/README.md
    mutable_by: [chief_architect, gatekeeper_orchestrator, human]
    agents_read: [all]
    notes: "Repository workflow, automation, and maintenance files."
